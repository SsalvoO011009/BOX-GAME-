<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>BOX GAME</title>

    <link rel="stylesheet" href="Style.css">

</head>

<body>

<div id="container">

    <!-- MENU -->
    <div id="sinistra">

        <h2>MENU</h2>

        <button id="restart">RIPROVA</button>

        <button id="pausa">PAUSA</button>

    </div>


    <!-- GIOCO -->
    <div id="centro">

        <h1>BOX GAME</h1>

        <div id="gioco">

            <!-- QUADRATO -->
            <div id="rosso"></div>

        </div>

        <h2 id="fine"></h2>

    </div>


    <!-- INFO -->
    <div id="destra">

        <h2>INFORMAZIONI</h2>

        <p>COUNTDOWN</p>

        <span id="tempo">10</span>

        <br><br>

        <p>PUNTI</p>

        <span id="punti">0</span>

        <br><br>

        <button id="info">ISTRUZIONI</button>

    </div>

</div>


<!-- POPUP -->
<div id="popup">

    <div id="popupInterno">

        <div id="chiudi">X</div>

        <p>

            Questo è un giochino che funziona nel seguente modo:
            clicca più volte il quadrato colorato nel meno tempo possibile.

        </p>

    </div>

</div>


<!-- JAVASCRIPT ALLA FINE -->
<script src="Script.js"></script>

</body>
</html>
