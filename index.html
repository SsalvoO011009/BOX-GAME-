<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <title>BOX GAME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <style>
	  *{
		  margin: 0;
		  padding: 0;
	  }
	  body, html{
		  margin: 0;
		  padding: 0;
	  }
	  
	  .container{
		  display: flex;
		  height: 100vh;
		  align-items: center;
		  text-align: center;
		  justify-content: center;
	  }
	  
	  .container .box{
		  display: flex;
		  flex-direction: column;
		  gap: 20px;
		  align-item: center;
		  border: 2px solid grey;
		  padding: 2rem;
		  width: fit-content;
		  height: fit-content;
		  background-color: lightgray;
		  
	  }
	  
	  .container .box h1{
		  color: red;
	  }
	  
	  .container .box input{
		  padding: 0.5rem;
	  }
	  
	  .container .box .bottone{
		  cursor: pointer;
		  background-color: lightblue;
		  border: none;
		  padding: 0.5rem;
		}
		
		.container .box .bottone .testo{
			text-decoration: none;
			color: black;
		}
	  
	  
  </style>
  
  <body>
	  <div class="container">
		  <div class="box">
			  <h1>BOX - GAME!</h1>
			  <input type="text" placeholder="Inserisci il nome">
			  <button class="bottone">
				  <a href="HTML/gioco.html" class="testo">
					  GIOCA
				  </a>
			  </button>
		  </div>
	  </div>
	  
	  
  </body>
</html>
